# Base configuration — no ports here (ports are in mode-specific override files)
# Run ./setup.sh to configure, then: docker compose up -d --build
# Or manually: docker compose -f docker-compose.yml -f docker-compose.kasmvnc.yml up -d --build
services:
  loxone-config:
    image: "local/loxone-config:latest"
    container_name: loxone-config
    platform: ${PLATFORM:-linux/amd64}
    build:
      context: .
      dockerfile: ${DOCKERFILE:-Dockerfile.kasmvnc}
    environment:
      # Classic jlesage vars (used by Dockerfile.amd64 / Dockerfile.arm64-qemu / Dockerfile)
      - USER_ID=${USER_ID:-1000}
      - GROUP_ID=${GROUP_ID:-1000}
      - DISPLAY_WIDTH=${DISPLAY_WIDTH:-1920}
      - DISPLAY_HEIGHT=${DISPLAY_HEIGHT:-1080}
      - HOME=/config/
      - WINEPREFIX=/config/wine
      - WINEARCH=win32
      - XLANG=${XLANG:-de}
      - VNC_PASSWORD=${VNC_PASSWORD:-}
      - SECURE_CONNECTION=${SECURE_CONNECTION:-0}
      - KEEP_APP_RUNNING=${KEEP_APP_RUNNING:-1}
    volumes:
      - "${CONFIG_PATH:-./config}:/config:rw"
      - "${LOXONE_PATH:-./config/Loxone}:/config/wine/drive_c/users/app/Documents/Loxone:rw"
    restart: unless-stopped
