# Classic noVNC override — ports for jlesage/baseimage-gui stack
# Use with: docker compose -f docker-compose.yml -f docker-compose.classic.yml up -d --build
# Or set in .env: COMPOSE_FILE=docker-compose.yml:docker-compose.classic.yml
# Access: http://localhost:5800

services:
  loxone-config:
    build:
      dockerfile: ${DOCKERFILE:-Dockerfile.amd64}
    ports:
      - "${HTTP_PORT:-5800}:5800"
      - "${VNC_PORT:-5900}:5900"
